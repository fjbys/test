<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF to JPG Converter | Browser-Based</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./lib/jszip.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8 text-gray-800">

  <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden p-6 md:p-10 border border-gray-100">
    
    <div class="text-center mb-10">
      <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-3">PDFをJPGに変換</h1>
      <p class="text-gray-500 text-sm leading-relaxed">
        ファイルはサーバーに送信されません。すべてお使いのブラウザ上で安全に処理されます。<br>
        機密書類や個人情報を含むPDFも安心してご利用いただけます。
      </p>
    </div>

    <div class="mb-8 p-5 bg-blue-50 border border-blue-100 rounded-xl grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label for="scaleSetting" class="block text-sm font-bold text-blue-900 mb-2">
          解像度 <span class="text-xs font-normal text-blue-700">(DPI / 精細さ)</span>
        </label>
        <select id="scaleSetting" class="w-full p-2.5 border border-blue-200 rounded-lg bg-white text-sm focus:ring-2 focus:ring-blue-400 outline-none transition">
          <option value="1.0">標準 (72 DPI) - プレビュー用・軽量</option>
          <option value="1.5">中画質 (108 DPI)</option>
          <option value="2.0" selected>高画質 (144 DPI) - おすすめ</option>
          <option value="3.0">超高画質 (216 DPI) - 印刷・精細</option>
        </select>
        <p class="mt-1 text-[11px] text-blue-600">※高くすると文字が鮮明になりますが、処理時間が増えます。</p>
      </div>

      <div>
        <label for="qualitySetting" class="block text-sm font-bold text-blue-900 mb-2">
          JPEG画質 <span class="text-xs font-normal text-blue-700">(Quality / 圧縮率)</span>
        </label>
        <select id="qualitySetting" class="w-full p-2.5 border border-blue-200 rounded-lg bg-white text-sm focus:ring-2 focus:ring-blue-400 outline-none transition">
          <option value="0.7">低 (70%) - ファイル容量を節約</option>
          <option value="0.8">中 (80%)</option>
          <option value="0.9" selected>高 (90%) - おすすめ</option>
          <option value="1.0">最高 (100%) - ノイズを最小化</option>
        </select>
        <p class="mt-1 text-[11px] text-blue-600">※高くすると画像がクリアになりますが、ファイルサイズが大きくなります。</p>
      </div>
    </div>

    <div class="flex items-center justify-center w-full mb-8">
      <label for="pdfInput" class="flex flex-col items-center justify-center w-full h-48 border-2 border-blue-300 border-dashed rounded-2xl cursor-pointer bg-white hover:bg-blue-50 transition-all group">
        <div class="flex flex-col items-center justify-center pt-5 pb-6">
          <svg class="w-12 h-12 mb-4 text-blue-400 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
          </svg>
          <p class="mb-2 text-lg text-gray-700"><span class="font-bold">クリックしてPDFを選択</span></p>
          <p class="text-xs text-gray-400">またはファイルをここにドラッグ＆ドロップ</p>
        </div>
        <input id="pdfInput" type="file" accept="application/pdf" class="hidden" />
      </label>
    </div>

    <div id="status" class="text-center text-blue-600 font-bold mb-6 hidden animate-pulse">
      変換処理中... しばらくお待ちください。
    </div>

    <div id="zipDownloadArea" class="text-center mb-10 hidden">
      <button id="downloadZipBtn" class="px-10 py-4 bg-green-600 text-white font-black rounded-full hover:bg-green-700 transition-all shadow-xl hover:shadow-2xl flex items-center justify-center mx-auto transform hover:-translate-y-1">
        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
        </svg>
        すべての画像をZIPで保存
      </button>
      <p id="zipStatus" class="text-sm text-gray-500 mt-3 hidden">ZIPファイルを作成しています...</p>
    </div>

    <div id="outputArea" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
    
  </div>

  <footer class="mt-8 text-center text-gray-400 text-xs">
    &copy; 2024 PDF to JPG Converter | Privacy Focused
  </footer>

  <script type="module">
    /**
     * PDF.js v5 ESM
     * libフォルダ内に pdf.mjs と pdf.worker.mjs を配置してください
     */
    import * as pdfjsLib from './lib/pdf.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = './lib/pdf.worker.mjs';

    const pdfInput = document.getElementById('pdfInput');
    const statusDiv = document.getElementById('status');
    const outputArea = document.getElementById('outputArea');
    const zipDownloadArea = document.getElementById('zipDownloadArea');
    const downloadZipBtn = document.getElementById('downloadZipBtn');
    const zipStatus = document.getElementById('zipStatus');

    let currentZip = null; 
    let currentFileName = "";
    let isProcessing = false;

    pdfInput.addEventListener('change', async function(e) {
      const file = e.target.files[0];
      if (!file || isProcessing) return;

      // 画質・解像度設定の取得
      const selectedScale = parseFloat(document.getElementById('scaleSetting').value);
      const selectedQuality = parseFloat(document.getElementById('qualitySetting').value);

      isProcessing = true;
      pdfInput.disabled = true;

      // 表示の初期化
      outputArea.innerHTML = '';
      zipDownloadArea.classList.add('hidden');
      statusDiv.classList.remove('hidden', 'text-green-600', 'text-red-600');
      statusDiv.classList.add('text-blue-600');
      statusDiv.innerText = `読み込み中: ${file.name}`;

      currentFileName = file.name.replace('.pdf', '');
      currentZip = new JSZip(); 
      const imgFolder = currentZip.folder(currentFileName);

      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        const numPages = pdf.numPages;

        for (let pageNum = 1; pageNum <= numPages; pageNum++) {
          statusDiv.innerText = `${numPages}ページ中 ${pageNum}ページ目を変換中...`;

          const page = await pdf.getPage(pageNum);
          
          // 設定されたScaleを適用
          const viewport = page.getViewport({scale: selectedScale});
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          // 背景を白で塗りつぶし（透過防止）
          context.fillStyle = '#ffffff';
          context.fillRect(0, 0, canvas.width, canvas.height);

          await page.render({canvasContext: context, viewport: viewport}).promise;

          // 設定されたQualityを適用してBlob生成
          const blob = await new Promise(resolve => {
            canvas.toBlob(resolve, 'image/jpeg', selectedQuality);
          });

          const zeroPaddedNum = String(pageNum).padStart(String(numPages).length, '0');
          const fileName = `${currentFileName}_${zeroPaddedNum}.jpg`;

          // ZIPに追加
          imgFolder.file(fileName, blob);

          // プレビュー表示用URL
          const blobUrl = URL.createObjectURL(blob);
          
          const pageContainer = document.createElement('div');
          pageContainer.className = 'border border-gray-100 rounded-xl p-5 bg-white shadow-sm flex flex-col items-center hover:shadow-md transition-shadow';

          const title = document.createElement('h3');
          title.className = 'text-sm font-bold text-gray-500 mb-3';
          title.innerText = `PAGE ${pageNum} / ${numPages}`;

          const imgPreview = document.createElement('img');
          imgPreview.src = blobUrl;
          imgPreview.className = 'max-w-full h-auto border border-gray-200 rounded mb-4';
          
          const singleDownloadBtn = document.createElement('a');
          singleDownloadBtn.href = blobUrl;
          singleDownloadBtn.download = fileName;
          singleDownloadBtn.className = 'w-full text-center text-xs font-bold py-2 border-2 border-blue-500 text-blue-500 rounded-lg hover:bg-blue-50 transition';
          singleDownloadBtn.innerText = 'このページを保存';

          pageContainer.appendChild(title);
          pageContainer.appendChild(imgPreview);
          pageContainer.appendChild(singleDownloadBtn);
          outputArea.appendChild(pageContainer);

          // ブラウザのUI更新を妨げないための短い待機
          await new Promise(r => setTimeout(r, 15));
        }

        statusDiv.innerText = "✓ すべての変換が完了しました！";
        statusDiv.classList.replace('text-blue-600', 'text-green-600');
        zipDownloadArea.classList.remove('hidden');

      } catch (error) {
        console.error(error);
        statusDiv.innerText = "× エラーが発生しました。ファイルが壊れているか、パスワードがかかっている可能性があります。";
        statusDiv.classList.replace('text-blue-600', 'text-red-600');
      } finally {
        isProcessing = false;
        pdfInput.disabled = false;
        pdfInput.value = ""; 
      }
    });

    // ZIPダウンロード実行
    downloadZipBtn.addEventListener('click', function() {
      if (!currentZip) return;
      
      downloadZipBtn.disabled = true;
      downloadZipBtn.classList.add('opacity-50', 'cursor-not-allowed');
      zipStatus.classList.remove('hidden');

      currentZip.generateAsync({type: "blob"}).then(function(content) {
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `${currentFileName}_converted.zip`;
        link.click();
        
        downloadZipBtn.disabled = false;
        downloadZipBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        zipStatus.classList.add('hidden');
      });
    });
  </script>
</body>
</html>
