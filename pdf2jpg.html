<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF to JPG Converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

  <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 md:p-8">
    <div class="text-center mb-8">
      <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">PDFをJPGに変換</h1>
      <p class="text-gray-500 text-sm">ファイルはサーバーに送信されず、お使いのブラウザ上で安全に処理されます。</p>
    </div>

    <div class="flex items-center justify-center w-full mb-6">
      <label for="pdfInput" class="flex flex-col items-center justify-center w-full h-40 border-2 border-blue-300 border-dashed rounded-lg cursor-pointer bg-blue-50 hover:bg-blue-100 transition">
        <div class="flex flex-col items-center justify-center pt-5 pb-6">
          <svg class="w-10 h-10 mb-3 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
          <p class="mb-2 text-sm text-gray-700"><span class="font-semibold">クリックしてPDFを選択</span></p>
        </div>
        <input id="pdfInput" type="file" accept="application/pdf" class="hidden" />
      </label>
    </div>

    <div id="status" class="text-center text-blue-600 font-semibold mb-6 hidden">
      変換処理中... しばらくお待ちください。
    </div>

    <div id="outputArea" class="space-y-8"></div>
  </div>

  <script>
    // PDF.jsのワーカーを設定
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const pdfInput = document.getElementById('pdfInput');
    const statusDiv = document.getElementById('status');
    const outputArea = document.getElementById('outputArea');

    pdfInput.addEventListener('change', async function(e) {
      const file = e.target.files[0];
      if (!file) return;

      // 初期化
      outputArea.innerHTML = '';
      statusDiv.classList.remove('hidden');
      statusDiv.innerText = `「${file.name}」を読み込み中...`;

      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        const numPages = pdf.numPages;

        statusDiv.innerText = `全${numPages}ページを変換中...`;

        // 全ページをループ処理
        for (let pageNum = 1; pageNum <= numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          
          // 画質設定 (scaleを大きくすると高画質になりますが、処理が重くなります。2.0〜3.0がおすすめ)
          const viewport = page.getViewport({scale: 2.0});
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          // キャンバスに描画
          await page.render({canvasContext: context, viewport: viewport}).promise;
          const imgData = canvas.toDataURL('image/jpeg', 0.9);

          // 画面に表示するための要素を作成
          const pageContainer = document.createElement('div');
          pageContainer.className = 'border border-gray-200 rounded-lg p-4 bg-gray-50 flex flex-col items-center';

          const title = document.createElement('h3');
          title.className = 'text-lg font-medium text-gray-700 mb-3';
          title.innerText = `${pageNum}ページ目`;

          const imgPreview = document.createElement('img');
          imgPreview.src = imgData;
          imgPreview.className = 'max-w-full h-auto border border-gray-300 shadow-sm mb-4';
          imgPreview.style.maxHeight = '400px'; // プレビューが大きくなりすぎないように制限

          const downloadBtn = document.createElement('a');
          downloadBtn.href = imgData;
          downloadBtn.download = `${file.name.replace('.pdf', '')}_page${pageNum}.jpg`;
          downloadBtn.className = 'px-6 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition shadow-md font-medium';
          downloadBtn.innerText = 'このページをダウンロード';

          // 要素を組み立てて追加
          pageContainer.appendChild(title);
          pageContainer.appendChild(imgPreview);
          pageContainer.appendChild(downloadBtn);
          outputArea.appendChild(pageContainer);
        }

        statusDiv.innerText = "変換が完了しました！下のボタンからダウンロードしてください。";
        statusDiv.classList.replace('text-blue-600', 'text-green-600');

      } catch (error) {
        console.error(error);
        statusDiv.innerText = "エラーが発生しました。別のPDFをお試しください。";
        statusDiv.classList.replace('text-blue-600', 'text-red-600');
      }
    });
  </script>
</body>
</html>
