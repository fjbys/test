<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Aspect Fitter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .safe-badge { font-size: 0.7rem; padding: 1px 6px; border-radius: 9999px; transition: all 0.3s; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
  <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 md:p-8">
    
    <div class="text-center mb-8">
      <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">Image Aspect Fitter</h1>
      <p class="text-gray-500 text-sm">余白を追加して、指定の画角に調整します。</p>
    </div>

    <div id="uploadArea" class="flex items-center justify-center w-full mb-6">
      <label for="imageInput" class="flex flex-col items-center justify-center w-full h-48 border-2 border-blue-300 border-dashed rounded-lg cursor-pointer bg-blue-50 hover:bg-blue-100 transition">
        <div class="flex flex-col items-center justify-center pt-5 pb-6">
          <svg class="w-12 h-12 mb-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          <p class="mb-2 text-sm text-gray-700 font-semibold">画像を選択してください</p>
        </div>
        <input id="imageInput" type="file" accept="image/png, image/jpeg" class="hidden" />
      </label>
    </div>

    <div id="editorArea" class="hidden space-y-6">
      <div class="bg-gray-50 p-4 rounded-lg flex flex-wrap gap-y-3 gap-x-6 items-center justify-center border border-gray-200">
        
        <div class="flex flex-col items-center gap-1">
          <div class="flex items-center gap-2">
            <span class="text-sm font-medium text-gray-600">背景色:</span>
            <input type="text" id="hexInput" value="#FFFFFF" class="w-24 px-2 py-1 border border-gray-300 rounded text-sm font-mono uppercase focus:ring-2 focus:ring-blue-400 outline-none">
            <input type="color" id="bgColorInput" value="#ffffff" class="w-8 h-8 rounded cursor-pointer border border-gray-300 p-0.5 bg-white">
          </div>
          <div id="safeColorStatus" class="safe-badge bg-gray-200 text-gray-500">CHECKING...</div>
        </div>
        
        <div class="hidden md:block w-px h-10 bg-gray-300 mx-2"></div>
        
        <div class="flex items-center gap-1.5 flex-wrap justify-center">
          <span class="text-sm font-medium text-gray-600">比率:</span>
          <button class="aspect-btn px-3 py-1.5 bg-blue-50 border border-blue-300 rounded text-sm text-blue-700 font-medium shadow-sm transition" data-aspect="original">そのまま</button>
          <button class="aspect-btn px-3 py-1.5 bg-white border border-gray-300 rounded text-sm hover:bg-gray-100 text-gray-700 shadow-sm transition" data-aspect="1.7777777777777777">16:9</button>
          <button class="aspect-btn px-3 py-1.5 bg-white border border-gray-300 rounded text-sm hover:bg-gray-100 text-gray-700 shadow-sm transition" data-aspect="1.3333333333333333">4:3</button>
          <button class="aspect-btn px-3 py-1.5 bg-white border border-gray-300 rounded text-sm hover:bg-gray-100 text-gray-700 shadow-sm transition" data-aspect="1">1:1</button>
        </div>
      </div>

      <div class="border border-gray-200 rounded-lg bg-gray-200 flex justify-center items-center overflow-hidden p-2" style="height: 400px;">
        <img id="imagePreview" src="" alt="プレビュー" class="w-full h-full object-contain drop-shadow-md">
      </div>

      <div class="bg-blue-50 p-6 rounded-xl border border-blue-100 space-y-4 text-center">
        <div class="flex items-center justify-center gap-6 mb-4">
          <label class="inline-flex items-center cursor-pointer">
            <input type="radio" name="format" value="image/jpeg" checked class="w-4 h-4 text-blue-600">
            <span class="ml-2 text-sm text-gray-700">JPG</span>
          </label>
          <label class="inline-flex items-center cursor-pointer">
            <input type="radio" name="format" value="image/png" class="w-4 h-4 text-blue-600">
            <span class="ml-2 text-sm text-gray-700">PNG</span>
          </label>
        </div>
        <div class="flex gap-4 justify-center">
          <button id="cancelBtn" class="px-6 py-2.5 border border-gray-300 bg-white text-gray-700 rounded-full hover:bg-gray-100 text-sm">やり直す</button>
          <button id="saveBtn" class="px-10 py-3 bg-green-600 text-white font-bold rounded-full hover:bg-green-700 shadow-lg flex items-center transition">
            保存する
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const imageInput = document.getElementById('imageInput');
    const uploadArea = document.getElementById('uploadArea');
    const editorArea = document.getElementById('editorArea');
    const imagePreview = document.getElementById('imagePreview');
    const aspectBtns = document.querySelectorAll('.aspect-btn');
    const bgColorInput = document.getElementById('bgColorInput');
    const hexInput = document.getElementById('hexInput');
    const safeColorStatus = document.getElementById('safeColorStatus');
    const cancelBtn = document.getElementById('cancelBtn');
    const saveBtn = document.getElementById('saveBtn');

    let originalImage = new Image();
    let originalFileName = "";
    let currentAspect = 'original';
    let currentBgColor = '#FFFFFF';
    let outputCanvas = null;

    // Webセーフカラー判定関数
    function checkWebSafe(hex) {
      const cleanHex = hex.replace('#', '');
      // 3桁なら6桁に変換
      const fullHex = cleanHex.length === 3 
        ? cleanHex.split('').map(c => c + c).join('') 
        : cleanHex;
      
      const r = parseInt(fullHex.substring(0, 2), 16);
      const g = parseInt(fullHex.substring(2, 4), 16);
      const b = parseInt(fullHex.substring(4, 6), 16);

      const safeValues = [0, 51, 102, 153, 204, 255]; // 00, 33, 66, 99, CC, FF
      const isSafe = safeValues.includes(r) && safeValues.includes(g) && safeValues.includes(b);

      if (isSafe) {
        safeColorStatus.textContent = "✓ Web Safe Color";
        safeColorStatus.className = "safe-badge bg-green-100 text-green-700 border border-green-200";
      } else {
        safeColorStatus.textContent = "× Not Web Safe";
        safeColorStatus.className = "safe-badge bg-gray-100 text-gray-400 border border-gray-200";
      }
    }

    // 色入力を同期させる
    function updateColor(newColor, source) {
      if (!newColor.startsWith('#')) newColor = '#' + newColor;
      if (!/^#[0-9A-F]{3,6}$/i.test(newColor)) return;

      currentBgColor = newColor;
      if (source !== 'picker') bgColorInput.value = newColor;
      if (source !== 'hex') hexInput.value = newColor.toUpperCase();
      
      checkWebSafe(newColor);
      processImage();
    }

    hexInput.addEventListener('input', (e) => updateColor(e.target.value, 'hex'));
    bgColorInput.addEventListener('input', (e) => updateColor(e.target.value, 'picker'));

    // 画像読み込み
    imageInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      originalFileName = file.name.replace(/\.[^/.]+$/, "");
      const reader = new FileReader();
      reader.onload = (event) => {
        originalImage.onload = () => {
          uploadArea.classList.add('hidden');
          editorArea.classList.remove('hidden');
          checkWebSafe(currentBgColor);
          processImage();
        };
        originalImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    // 画角切り替え
    aspectBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        currentAspect = this.getAttribute('data-aspect');
        aspectBtns.forEach(b => {
          b.classList.replace('bg-blue-50', 'bg-white');
          b.classList.remove('border-blue-300', 'text-blue-700', 'font-medium');
        });
        this.classList.replace('bg-white', 'bg-blue-50');
        this.classList.add('border-blue-300', 'text-blue-700', 'font-medium');
        processImage();
      });
    });

    function processImage() {
      if (!originalImage.src) return;
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const sw = originalImage.width;
      const sh = originalImage.height;
      let tw = sw, th = sh;

      if (currentAspect !== 'original') {
        const targetRatio = parseFloat(currentAspect);
        if (targetRatio > sw / sh) {
          th = sh; tw = Math.round(sh * targetRatio);
        } else {
          tw = sw; th = Math.round(sw / targetRatio);
        }
      }

      canvas.width = tw; canvas.height = th;
      ctx.fillStyle = currentBgColor;
      ctx.fillRect(0, 0, tw, th);
      ctx.drawImage(originalImage, (tw - sw) / 2, (th - sh) / 2, sw, sh);
      
      outputCanvas = canvas;
      imagePreview.src = canvas.toDataURL('image/jpeg', 0.9);
    }

    saveBtn.addEventListener('click', function() {
      const format = document.querySelector('input[name="format"]:checked').value;
      outputCanvas.toBlob(blob => {
        const a = document.createElement('a');
        a.download = `${originalFileName}_fixed.${format === 'image/png' ? 'png' : 'jpg'}`;
        a.href = URL.createObjectURL(blob);
        a.click();
      }, format, 0.95);
    });

    cancelBtn.addEventListener('click', () => location.reload());
  </script>
</body>
</html>
