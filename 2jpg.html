<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Image to JPG Converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
  <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 md:p-8">
    <div class="text-center mb-8">
      <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">あらゆる画像をJPGに一括変換</h1>
      <p class="text-gray-500 text-sm">.j2, .heic, .tiff, .psd 等に対応。ブラウザ上で安全に処理されます。</p>
    </div>

    <div class="flex items-center justify-center w-full mb-6">
      <label id="dropZone" for="imageInput" class="flex flex-col items-center justify-center w-full h-40 border-2 border-blue-300 border-dashed rounded-lg cursor-not-allowed bg-gray-100 transition duration-300">
        <div class="flex flex-col items-center justify-center pt-5 pb-6">
          <svg id="uploadIcon" class="w-10 h-10 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
          <p id="uploadText" class="mb-2 text-sm text-gray-700 text-center px-4">
            <span class="font-semibold">システム準備中...</span><br>しばらくお待ちください（WASMをロード中）
          </p>
        </div>
        <input id="imageInput" type="file" multiple accept="image/*,.j2,.jp2,.heic,.tiff,.psd,.webp" class="hidden" disabled />
      </label>
    </div>

    <div id="status" class="text-center text-blue-600 font-semibold mb-4 hidden"></div>

    <div id="zipDownloadArea" class="text-center mb-8 hidden">
      <button id="downloadZipBtn" class="px-8 py-3 bg-green-600 text-white font-bold rounded-full hover:bg-green-700 transition shadow-lg flex items-center justify-center mx-auto">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        すべての画像をZIPで保存
      </button>
      <p id="zipStatus" class="text-sm text-gray-500 mt-2 hidden">ZIP生成中...</p>
    </div>

    <div id="outputArea" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
  </div>

  <script type="module">
    // Magick.WASMのインポート
    import { ImageMagick, initializeImageMagick, MagickFormat } from 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.30/dist/index.mjs';

    const imageInput = document.getElementById('imageInput');
    const dropZone = document.getElementById('dropZone');
    const uploadText = document.getElementById('uploadText');
    const uploadIcon = document.getElementById('uploadIcon');
    const statusDiv = document.getElementById('status');
    const outputArea = document.getElementById('outputArea');
    const zipDownloadArea = document.getElementById('zipDownloadArea');
    const downloadZipBtn = document.getElementById('downloadZipBtn');

    let currentZip = null;
    let isProcessing = false;

    // --- 1. WASMエンジンの初期化 ---
    const wasmUrl = 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.30/dist/magick.wasm';

    console.log("WASM初期化開始...");
    initializeImageMagick(wasmUrl).then(() => {
      console.log("WASM初期化成功！");
      imageInput.disabled = false;
      dropZone.classList.remove('cursor-not-allowed', 'bg-gray-100');
      dropZone.classList.add('cursor-pointer', 'bg-blue-50', 'hover:bg-blue-100');
      uploadIcon.classList.replace('text-gray-400', 'text-blue-500');
      uploadText.innerHTML = '<span class="font-semibold text-blue-600">準備完了！</span><br>クリックして画像を選択、またはドラッグ＆ドロップ';
    }).catch(err => {
      console.error("WASM初期化エラー:", err);
      uploadText.innerHTML = '<span class="text-red-500 font-bold">初期化失敗</span><br>ブラウザでローカルサーバーを使っているか確認してください。';
    });

    // --- 2. 変換処理（1枚あたり） ---
    async function convertSingleFile(file) {
      const arrayBuffer = await file.arrayBuffer();
      const data = new Uint8Array(arrayBuffer);

      return new Promise((resolve, reject) => {
        try {
          ImageMagick.read(data, (image) => {
            console.log(`処理中: ${file.name} (${image.width}x${image.height})`);
            image.format = MagickFormat.Jpeg;
            image.quality = 85;
            
            image.write((outData) => {
              const blob = new Blob([outData], { type: 'image/jpeg' });
              resolve(blob);
            });
          });
        } catch (err) {
          reject(err);
        }
      });
    }

    // --- 3. メインイベント処理 ---
    imageInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      if (files.length === 0 || isProcessing) return;

      isProcessing = true;
      imageInput.disabled = true;
      dropZone.style.opacity = "0.5";
      outputArea.innerHTML = '';
      zipDownloadArea.classList.add('hidden');
      statusDiv.classList.remove('hidden', 'text-green-600', 'text-red-600');
      statusDiv.classList.add('text-blue-600');
      
      currentZip = new JSZip();

      try {
        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          
          // ステータス表示を更新
          statusDiv.innerText = `[${i + 1} / ${files.length}] 変換準備中: ${file.name}`;
          
          // ★超重要：ブラウザに描画のチャンスを与える（フリーズ回避）
          await new Promise(r => setTimeout(r, 100));

          const baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
          const newFileName = `${baseName}.jpg`;

          // 変換実行
          const blob = await convertSingleFile(file);

          // ZIP追加
          currentZip.file(newFileName, blob);

          // プレビュー生成
          const url = URL.createObjectURL(blob);
          createCard(url, newFileName);

          statusDiv.innerText = `[${i + 1} / ${files.length}] 完了: ${newFileName}`;
        }

        statusDiv.innerText = "すべての変換が完了しました！";
        statusDiv.classList.replace('text-blue-600', 'text-green-600');
        if (files.length > 1) zipDownloadArea.classList.remove('hidden');

      } catch (err) {
        console.error("変換エラー:", err);
        statusDiv.innerText = "エラー: " + err.message;
        statusDiv.classList.replace('text-blue-600', 'text-red-600');
      } finally {
        isProcessing = false;
        imageInput.disabled = false;
        dropZone.style.opacity = "1";
        imageInput.value = "";
      }
    });

    // プレビューカード生成
    function createCard(url, name) {
      const div = document.createElement('div');
      div.className = 'bg-white border rounded-lg p-3 shadow-sm flex flex-col items-center';
      div.innerHTML = `
        <img src="${url}" class="w-full h-32 object-contain bg-gray-100 rounded mb-2">
        <p class="text-xs text-gray-500 truncate w-full text-center mb-2">${name}</p>
        <a href="${url}" download="${name}" class="text-xs text-blue-500 font-bold hover:underline">単体ダウンロード</a>
      `;
      outputArea.appendChild(div);
    }

    // ZIPダウンロード
    downloadZipBtn.addEventListener('click', async () => {
      const zipStatus = document.getElementById('zipStatus');
      zipStatus.classList.remove('hidden');
      const content = await currentZip.generateAsync({ type: "blob" });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(content);
      link.download = "converted_images.zip";
      link.click();
      zipStatus.classList.add('hidden');
    });
  </script>
</body>
</html>
