<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Advanced Image Converter & Metadata Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-4 sm:p-8">

  <div class="max-w-4xl mx-auto bg-slate-900 rounded-3xl shadow-2xl border border-slate-800 p-8">
    <div class="mb-8 text-center">
      <h1 class="text-2xl font-bold text-white mb-2 italic">Format & Metadata Master</h1>
      <p class="text-slate-500 text-xs tracking-widest uppercase">Convert / Analyze / Strip EXIF</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
      <div class="bg-black/40 p-5 rounded-2xl border border-slate-800">
        <label class="block text-[10px] font-bold text-slate-500 mb-3 uppercase tracking-widest">Output Setting</label>
        <select id="formatSelect" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs mb-3">
          <option value="JPG">JPG (Quality: 85%)</option>
          <option value="PNG">PNG (Lossless)</option>
        </select>
        <div id="qualityInfo" class="text-[10px] text-indigo-400 font-mono">JPG Quality: 85%</div>
        <input id="qualityRange" type="range" min="10" max="100" value="85" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500 mt-2">
      </div>

      <div class="bg-black/40 p-5 rounded-2xl border border-slate-800 flex flex-col justify-between">
        <label class="block text-[10px] font-bold text-slate-500 mb-3 uppercase tracking-widest">Metadata Control</label>
        <div class="flex items-center justify-between">
          <span class="text-xs font-bold text-slate-300">EXIF情報を削除</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="stripExif" class="sr-only peer" checked>
            <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
          </label>
        </div>
        <p class="text-[9px] text-slate-500 mt-2">※削除すると位置情報やカメラ設定が消去され、ファイル容量がわずかに減ります。</p>
      </div>

      <div class="bg-indigo-900/20 p-5 rounded-2xl border border-indigo-500/30 flex flex-col items-center justify-center">
        <input id="imageInput" type="file" multiple class="hidden" accept="image/*,.heic,.psd,.tiff,.webp" />
        <label for="imageInput" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-center font-bold text-sm cursor-pointer transition shadow-lg shadow-indigo-900/40">
          画像を選択
        </label>
      </div>
    </div>

    <div id="debugLog" class="mb-6 p-4 bg-black rounded-xl font-mono text-[10px] text-green-400 overflow-y-auto max-h-40 border border-slate-800 shadow-inner">
      > Engine ready. Waiting for input...
    </div>

    <div id="zipArea" class="mt-8 text-center hidden">
      <button id="downloadZipBtn" class="bg-white text-slate-900 px-12 py-3 rounded-full font-bold hover:bg-slate-200 transition shadow-xl">ZIPファイルをダウンロード</button>
    </div>

    <div id="outputArea" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mt-8"></div>
  </div>

  <script type="module">
    import { ImageMagick, initializeImageMagick, MagickFormat, MagickColor, MagickGeometry } from 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.39/dist/index.js';

    const debug = (msg, type='info') => {
      const el = document.getElementById('debugLog');
      const colors = { info:'text-green-400', err:'text-red-500', debug:'text-blue-400' };
      el.innerHTML += `> <span class="${colors[type]}">${msg}</span><br>`;
      el.scrollTop = el.scrollHeight;
    };

    // 最大公約数を求める（比率計算用）
    const getGCD = (a, b) => b ? getGCD(b, a % b) : a;
    const getAspectRatio = (w, h) => {
      const common = getGCD(w, h);
      return `${w / common}:${h / common}`;
    };

    let zip = null;

    async function init() {
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.39/dist/magick.wasm');
        await initializeImageMagick(new Uint8Array(await resp.arrayBuffer()));
        debug("Engine Loaded.");
      } catch(e) { debug("Init Error: " + e.message, "err"); }
    }

    document.getElementById('qualityRange').oninput = (e) => {
      document.getElementById('qualityInfo').innerText = `JPG Quality: ${e.target.value}%`;
    };

    document.getElementById('imageInput').onchange = async (e) => {
      const files = Array.from(e.target.files);
      if(!files.length) return;
      zip = new JSZip();
      document.getElementById('outputArea').innerHTML = '';
      debug(`Processing ${files.length} files...`, "debug");
      
      for(const file of files) await processFile(file);
      
      document.getElementById('zipArea').classList.remove('hidden');
      debug("Batch processing complete.");
    };

    async function processFile(file) {
      try {
        const bytes = new Uint8Array(await file.arrayBuffer());
        const format = document.getElementById('formatSelect').value;
        const quality = document.getElementById('qualityRange').value;
        const shouldStrip = document.getElementById('stripExif').checked;

        await ImageMagick.readCollection(bytes, (images) => {
          const img = [...images].sort((a,b) => (b.width*b.height)-(a.width*a.height))[0];
          
          img.autoOrient();
          img.page = new MagickGeometry(0,0,img.width,img.height);
          
          // --- 情報抽出 ---
          const w = img.width;
          const h = img.height;
          const ratio = getAspectRatio(w, h);
          const model = img.getAttribute("exif:Model") || "None";
          const date = img.getAttribute("exif:DateTime") || "Unknown";

          // --- 変換処理 ---
          if(shouldStrip) {
            img.strip(); // EXIF/メタデータ削除
            debug(`Stripped metadata from ${file.name}`);
          }

          if(format === 'JPG') {
            img.backgroundColor = new MagickColor("white");
            try { img.alpha(11); } catch(e){}
            img.quality = quality;
          }
          
          const targetFormat = format === 'JPG' ? MagickFormat.Jpeg : MagickFormat.Png;
          img.write(targetFormat, data => {
            const ext = format.toLowerCase();
            const blob = new Blob([data], {type: `image/${ext}`});
            const outName = file.name.replace(/\.[^/.]+$/, "") + "." + ext;
            zip.file(outName, blob);
            addInfoCard(URL.createObjectURL(blob), outName, w, h, ratio, model, date);
            debug(`Converted: ${outName}`);
          });
        });
      } catch(e) { debug(`Error [${file.name}]: ${e.message}`, "err"); }
    }

    function addInfoCard(url, name, w, h, ratio, model, date) {
      const container = document.getElementById('outputArea');
      const card = document.createElement('div');
      card.className = "bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden shadow-xl flex flex-col";
      card.innerHTML = `
        <div class="h-32 bg-black flex items-center justify-center p-2">
          <img src="${url}" class="max-w-full max-h-full object-contain">
        </div>
        <div class="p-4 flex-grow">
          <div class="text-[10px] font-mono text-indigo-400 mb-1 truncate">${name}</div>
          <div class="grid grid-cols-2 gap-2 mt-3">
            <div class="text-center bg-slate-900 rounded-lg p-2">
              <div class="text-[9px] text-slate-500 uppercase">Size</div>
              <div class="text-[11px] font-bold">${w} × ${h}</div>
            </div>
            <div class="text-center bg-slate-900 rounded-lg p-2">
              <div class="text-[9px] text-slate-500 uppercase">Ratio</div>
              <div class="text-[11px] font-bold text-indigo-300">${ratio}</div>
            </div>
          </div>
          <div class="mt-3 space-y-1">
            <div class="flex justify-between text-[10px]">
              <span class="text-slate-500">Camera:</span>
              <span class="text-slate-300 truncate ml-2">${model}</span>
            </div>
            <div class="flex justify-between text-[10px]">
              <span class="text-slate-500">Date:</span>
              <span class="text-slate-300">${date}</span>
            </div>
          </div>
        </div>
        <a href="${url}" download="${name}" class="bg-slate-700 hover:bg-slate-600 text-center py-2 text-[10px] font-bold transition">単体ダウンロード</a>
      `;
      container.appendChild(card);
    }

    document.getElementById('downloadZipBtn').onclick = async () => {
      const content = await zip.generateAsync({type:"blob"});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(content);
      a.download = `converted_images_${Date.now()}.zip`;
      a.click();
    };

    init();
  </script>
</body>
</html>
