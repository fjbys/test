<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Image Editor (Crop & Convert)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
  <style>
    /* Cropper用のスタイル調整 */
    .cropper-view-box, .cropper-face { border-radius: 0; }
    /* フェードインアニメーション */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden p-6 md:p-8">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">画像切り抜き＆JPG変換</h1>
        <p class="text-gray-500 text-sm">.j2, .heic, .psdなどあらゆる形式に対応。範囲を選んでJPGにします。</p>
      </div>

      <div class="flex items-center justify-center w-full mb-8">
        <label id="dropZone" for="imageInput" class="flex flex-col items-center justify-center w-full h-32 border-2 border-blue-300 border-dashed rounded-xl cursor-not-allowed bg-gray-50 transition duration-300">
          <div id="uploadUI" class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
            <svg id="uploadIcon" class="w-10 h-10 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            <p id="uploadText" class="text-sm text-gray-700">
              <span class="font-bold text-orange-600 block mb-1">エンジン読み込み中...</span>
              <span class="text-xs text-gray-500">WASMファイルをフェッチしています (約14MB)</span>
            </p>
          </div>
          <input id="imageInput" type="file" multiple accept="image/*,.j2,.jp2,.heic,.tiff,.psd,.webp" class="hidden" disabled />
        </label>
      </div>

      <div id="globalStatus" class="text-center text-gray-600 mb-6 hidden font-medium p-3 bg-blue-50 rounded-lg animate-fadeIn"></div>

      <div id="zipArea" class="text-center mb-8 hidden animate-fadeIn">
        <button id="downloadZipBtn" class="px-8 py-3 bg-green-600 text-white font-bold rounded-full hover:bg-green-700 transition shadow-lg flex items-center justify-center mx-auto text-lg">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
          処理済み画像をすべてZIPで保存
        </button>
      </div>

      <div id="outputArea" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6"></div>
    </div>
  </div>

  <div id="cropModal" class="fixed inset-0 bg-black bg-opacity-85 z-50 flex items-center justify-center hidden p-4 transition-opacity duration-300 opacity-0">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-6xl max-h-[95vh] flex flex-col overflow-hidden animate-fadeIn">
      
      <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between bg-gray-50">
        <h2 id="modalTitle" class="text-xl font-bold text-gray-800 truncate">画像を編集</h2>
        <div class="flex items-center gap-2">
          <span id="queueProgress" class="text-sm font-medium text-gray-500 bg-white px-3 py-1 rounded-full border border-gray-200">1 / 1</span>
          <button id="cancelBtn" class="text-gray-400 hover:text-gray-600 p-1.5 rounded-full hover:bg-gray-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
      </div>

      <div class="flex-grow p-4 bg-gray-900 flex items-center justify-center overflow-hidden min-h-[50vh]">
        <div id="modalLoading" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 bg-opacity-90 z-10 text-white">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-white mb-4"></div>
          <p class="text-sm font-medium">画像を展開中...</p>
          <p class="text-xs text-gray-400 mt-1">(.j2形式などは時間がかかります)</p>
        </div>
        <div class="w-full h-full flex items-center justify-center">
          <img id="editingImage" class="max-w-full max-h-full block">
        </div>
      </div>

      <div class="px-6 py-5 border-t border-gray-200 bg-white">
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
          <div class="flex items-center gap-2 border border-gray-200 rounded-full p-1 bg-gray-50">
            <span class="text-xs font-bold text-gray-500 px-3">比率:</span>
            <button class="ratio-btn px-4 py-1.5 text-sm rounded-full bg-blue-600 text-white font-medium" data-ratio="NaN">フリー</button>
            <button class="ratio-btn px-4 py-1.5 text-sm rounded-full text-gray-700 hover:bg-gray-100" data-ratio="1.7777777777777777">16:9</button>
            <button class="ratio-btn px-4 py-1.5 text-sm rounded-full text-gray-700 hover:bg-gray-100" data-ratio="1.3333333333333333">4:3</button>
            <button class="ratio-btn px-4 py-1.5 text-sm rounded-full text-gray-700 hover:bg-gray-100" data-ratio="1">1:1</button>
          </div>
          <div class="flex items-center gap-3 w-full sm:w-auto">
            <button id="skipBtn" class="flex-1 sm:flex-none px-6 py-3 border border-gray-300 text-gray-700 font-semibold rounded-full hover:bg-gray-50 transition">この画像をスキップ</button>
            <button id="cropConfirmBtn" class="flex-1 sm:flex-none px-10 py-3 bg-blue-600 text-white font-bold rounded-full hover:bg-blue-700 transition shadow-md flex items-center justify-center">
              <span id="confirmText">切り抜いてJPGに変換</span>
              <div id="confirmSpinner" class="animate-spin rounded-full h-5 w-5 border-b-2 border-white ml-2 hidden"></div>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { ImageMagick, initializeImageMagick, MagickFormat, MagickColor, AlphaOption, Gravity } from 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.39/dist/index.js';

    // DOM要素の取得
    const imageInput = document.getElementById('imageInput');
    const dropZone = document.getElementById('dropZone');
    const uploadText = document.getElementById('uploadText');
    const globalStatus = document.getElementById('globalStatus');
    const outputArea = document.getElementById('outputArea');
    const zipArea = document.getElementById('zipArea');
    const downloadZipBtn = document.getElementById('downloadZipBtn');

    // モダル要素
    const cropModal = document.getElementById('cropModal');
    const editingImage = document.getElementById('editingImage');
    const modalTitle = document.getElementById('modalTitle');
    const queueProgress = document.getElementById('queueProgress');
    const modalLoading = document.getElementById('modalLoading');
    const cropConfirmBtn = document.getElementById('cropConfirmBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const skipBtn = document.getElementById('skipBtn');

    // アプリケーションの状態
    let currentZip = null;
    let fileQueue = []; // 順番待ちのファイル
    let currentFileIndex = 0;
    let cropperInstance = null; // Cropperのインスタンス
    let isModalProcessing = false; // モーダル内で処理中か

    // --- 1. WASMエンジンのロード (Empty Buffer対策) ---
    async function bootWasm() {
      const wasmUrl = 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.39/dist/magick.wasm';
      try {
        console.log("WASMロード開始...");
        const resp = await fetch(wasmUrl);
        if (!resp.ok) throw new Error("WASMフェッチ失敗");
        const buf = await resp.arrayBuffer();
        if (buf.byteLength === 0) throw new Error("WASMデータが空です");
        await initializeImageMagick(new Uint8Array(buf));
        console.log("Magick.WASM 準備完了");
        enableMainUI();
      } catch (err) {
        console.error("起動エラー:", err);
        uploadText.innerHTML = `<span class="text-red-500 font-bold text-lg">起動失敗</span><br><span class="text-xs text-gray-400">${err.message}</span>`;
      }
    }

    function enableMainUI() {
      imageInput.disabled = false;
      dropZone.classList.remove('cursor-not-allowed', 'bg
