<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Image Editor Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="p-4 md:p-8 max-w-5xl mx-auto">
    <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8">
      
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">画像切り抜き＆JPG一括変換</h1>
        <p class="text-gray-500 text-sm">.j2, .heic, .psd対応 | システムエラー修正済み</p>
      </div>

      <div id="debugLog" class="mb-6 p-3 bg-gray-900 rounded-lg text-green-400 font-mono text-xs overflow-y-auto max-h-32 shadow-inner">
        > システムを初期化しています...<br>
      </div>

      <div class="mb-8">
        <label id="dropZone" for="imageInput" class="flex flex-col items-center justify-center w-full h-40 border-2 border-blue-300 border-dashed rounded-xl cursor-not-allowed bg-gray-100 transition-all duration-300">
          <div id="uploadUI" class="flex flex-col items-center justify-center text-center px-4">
            <svg id="uploadIcon" class="w-12 h-12 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            <p id="uploadText" class="text-sm text-gray-700 font-medium">エンジンをロードしています...</p>
          </div>
          <input id="imageInput" type="file" multiple accept="image/*,.j2,.jp2,.heic,.tiff,.psd,.webp" class="hidden" disabled />
        </label>
      </div>

      <div id="zipArea" class="text-center mb-8 hidden">
        <button id="downloadZipBtn" class="px-8 py-3 bg-green-600 text-white font-bold rounded-full hover:bg-green-700 transition shadow-lg flex items-center justify-center mx-auto text-lg">一括保存 (ZIP)</button>
      </div>

      <div id="outputArea" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
    </div>
  </div>

  <div id="cropModal" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center hidden p-4 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden">
      <div class="px-6 py-4 border-b flex items-center justify-between bg-gray-50">
        <h2 id="modalTitle" class="font-bold text-gray-700 truncate">編集</h2>
        <span id="queueInfo" class="text-xs font-bold bg-blue-100 text-blue-600 px-3 py-1 rounded-full">1 / 1</span>
      </div>
      <div class="flex-grow p-4 bg-gray-800 flex items-center justify-center relative min-h-[40vh]">
        <img id="editingImage" class="max-w-full max-h-full block">
        <div id="modalLoading" class="absolute inset-0 bg-gray-900/80 flex flex-col items-center justify-center text-white">
          <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
          <p id="loadingMsg" class="text-sm font-bold">画像を処理中...</p>
        </div>
      </div>
      <div class="p-6 border-t bg-white">
        <div class="flex flex-wrap items-center justify-between gap-4">
          <div class="flex gap-1 bg-gray-100 p-1 rounded-lg">
            <button class="ratio-btn px-4 py-1.5 text-xs font-bold rounded-md bg-white shadow-sm" data-ratio="NaN">フリー</button>
            <button class="ratio-btn px-4 py-1.5 text-xs font-bold rounded-md text-gray-600" data-ratio="1.77777777">16:9</button>
            <button class="ratio-btn px-4 py-1.5 text-xs font-bold rounded-md text-gray-600" data-ratio="1.33333333">4:3</button>
            <button class="ratio-btn px-4 py-1.5 text-xs font-bold rounded-md text-gray-600" data-ratio="1">1:1</button>
          </div>
          <div class="flex gap-3 w-full sm:w-auto">
            <button id="skipBtn" class="px-6 py-2.5 text-sm font-bold text-gray-500 border rounded-full hover:bg-gray-50">スキップ</button>
            <button id="cropConfirmBtn" class="px-8 py-2.5 bg-blue-600 text-white font-bold rounded-full hover:bg-blue-700 shadow-md">決定して次へ</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    // 【修正】AlphaOption を import から削除しました
    import { 
      ImageMagick, 
      initializeImageMagick, 
      MagickFormat, 
      MagickColor 
    } from 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.39/dist/index.js';

    function log(msg, isError = false) {
      const panel = document.getElementById('debugLog');
      panel.innerHTML += `<span class="${isError ? 'text-red-500 font-bold' : ''}">> ${msg}</span><br>`;
      panel.scrollTop = panel.scrollHeight;
    }

    async function initApp() {
      const wasmUrl = 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.39/dist/magick.wasm';
      try {
        log("WASMフェッチ開始...");
        const resp = await fetch(wasmUrl);
        const wasmBytes = await resp.arrayBuffer();
        await initializeImageMagick(new Uint8Array(wasmBytes));
        log("エンジン準備完了。");
        startApp();
      } catch (err) {
        log("初期化に失敗しました: " + err.message, true);
        console.error(err);
      }
    }

    function startApp() {
      const input = document.getElementById('imageInput');
      const dropZone = document.getElementById('dropZone');
      input.disabled = false;
      dropZone.classList.replace('cursor-not-allowed', 'cursor-pointer');
      dropZone.classList.replace('bg-gray-100', 'bg-blue-50');
      document.getElementById('uploadIcon').classList.replace('text-gray-400', 'text-blue-500');
      document.getElementById('uploadText').innerText = "準備完了。画像を選択してください。";

      let queue = [], index = 0, zip = null, cropper = null;

      input.addEventListener('change', (e) => {
        queue = Array.from(e.target.files);
        if (!queue.length) return;
        index = 0; zip = new JSZip();
        document.getElementById('outputArea').innerHTML = '';
        processNext();
      });

      async function processNext() {
        if (index >= queue.length) {
          closeModal();
          if (document.getElementById('outputArea').childElementCount > 1) zipArea.classList.remove('hidden');
          return;
        }

        const file = queue[index];
        openModal(file.name, index + 1, queue.length);

        try {
          const bytes = new Uint8Array(await file.arrayBuffer());
          log(`${file.name} を読み込み中...`);

          const pngBlob = await new Promise((res, rej) => {
            try {
              ImageMagick.read(bytes, img => {
                img.write(data => res(new Blob([data], {type:'image/png'})));
              });
            } catch (e) { rej(e); }
          });

          const url = URL.createObjectURL(pngBlob);
          const imgEl = document.getElementById('editingImage');
          imgEl.src = url;
          imgEl.onload = () => {
            document.getElementById('modalLoading').classList.add('hidden');
            if(cropper) cropper.destroy();
            cropper = new Cropper(imgEl, { viewMode: 1, autoCropArea: 0.8 });
          };
        } catch (e) {
          log(`展開失敗: ${file.name}`, true);
          index++; processNext();
        }
      }

      document.getElementById('cropConfirmBtn').onclick = async () => {
        if (!cropper) return;
        const file = queue[index];
        const cropData = cropper.getData({ rounded: true });
        document.getElementById('loadingMsg').innerText = "JPG変換中...";
        document.getElementById('modalLoading').classList.remove('hidden');

        try {
          const bytes = new Uint8Array(await file.arrayBuffer());
          
          const jpgBlob = await new Promise((res, rej) => {
            try {
              ImageMagick.read(bytes, img => {
                // 背景を白にする
                img.backgroundColor = new MagickColor("white");
                
                // 【修正】AlphaOption を直接使わず、数値「11」 (Remove) を使用
                // ライブラリによって異なる場合があるため、失敗しても続行するように try-catch で囲む
                try {
                   img.alpha(11); // 11 は ImageMagick の AlphaOption.Remove に相当
                } catch(e) {
                   console.log("Alpha option skip");
                }

                // 切り抜き座標の安全補正
                const x = Math.max(0, cropData.x);
                const y = Math.max(0, cropData.y);
                const w = Math.min(cropData.width, img.width - x);
                const h = Math.min(cropData.height, img.height - y);
                
                img.crop(w, h, x, y);
                img.format = MagickFormat.Jpeg;
                img.quality = 85;
                img.write(data => res(new Blob([data], {type:'image/jpeg'})));
              });
            } catch (e) { rej(e); }
          });

          const newName = file.name.replace(/\.[^/.]+$/, "") + "_cropped.jpg";
          zip.file(newName, jpgBlob);
          addCard(URL.createObjectURL(jpgBlob), newName);
          log(`成功: ${newName}`);
          index++; processNext();
        } catch (e) {
          log(`エラー: ${e.message}`, true);
          alert(`失敗しました: ${e.message}`);
          document.getElementById('modalLoading').classList.add('hidden');
        }
      };

      document.getElementById('skipBtn').onclick = () => { index++; processNext(); };
      
      document.querySelectorAll('.ratio-btn').forEach(b => {
        b.onclick = (e) => {
          cropper.setAspectRatio(parseFloat(e.target.dataset.ratio));
          document.querySelectorAll('.ratio-btn').forEach(btn => btn.classList.remove('bg-white', 'shadow-sm'));
          e.target.classList.add('bg-white', 'shadow-sm');
        };
      });

      downloadZipBtn.onclick = async () => {
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = "images.zip";
        a.click();
      };
    }

    function openModal(name, cur, total) {
      document.getElementById('cropModal').classList.remove('hidden');
      document.getElementById('modalTitle').innerText = name;
      document.getElementById('queueInfo').innerText = `${cur} / ${total}`;
    }

    function closeModal() { document.getElementById('cropModal').classList.add('hidden'); }

    function addCard(url, name) {
      const area = document.getElementById('outputArea');
      const div = document.createElement('div');
      div.className = "bg-white p-2 border rounded-xl shadow-sm";
      div.innerHTML = `<img src="${url}" class="w-full h-24 object-contain mb-2"><p class="text-[10px] truncate mb-2 text-center text-gray-400">${name}</p><a href="${url}" download="${name}" class="block text-center text-xs font-bold text-blue-500 py-1 bg-blue-50 rounded-lg">保存</a>`;
      area.appendChild(div);
    }

    initApp();
  </script>
</body>
</html>
