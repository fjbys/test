<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Editor Pro - Final Fix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
</head>
<body class="bg-slate-900 min-h-screen text-slate-200">

  <div class="p-4 md:p-8 max-w-6xl mx-auto">
    <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 p-6">
      <h1 class="text-xl font-bold text-white mb-4">画像切り抜きツール <span class="text-xs font-normal text-slate-400">Ver 2.1 (Geometry Fix)</span></h1>

      <div id="debugLog" class="mb-6 p-4 bg-black rounded-lg font-mono text-[10px] text-green-400 overflow-y-auto max-h-40 border border-slate-700 shadow-inner"></div>

      <div class="mb-8">
        <label id="dropZone" for="imageInput" class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-600 border-dashed rounded-xl cursor-pointer bg-slate-800/50 hover:border-blue-500 transition-all">
          <div id="uploadUI" class="text-center">
            <p id="uploadText" class="text-sm text-slate-400 font-bold">画像を選択またはドロップ</p>
          </div>
          <input id="imageInput" type="file" multiple accept="image/*,.j2,.jp2,.heic,.tiff,.psd,.webp" class="hidden" />
        </label>
      </div>

      <div id="zipArea" class="text-center mb-8 hidden">
        <button id="downloadZipBtn" class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-full hover:bg-indigo-700 shadow-lg transition">一括保存 (ZIP)</button>
      </div>

      <div id="outputArea" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-4"></div>
    </div>
  </div>

  <div id="cropModal" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center hidden p-4">
    <div class="bg-slate-800 rounded-2xl w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden border border-slate-700">
      <div class="px-6 py-3 border-b border-slate-700 flex items-center justify-between">
        <h2 id="modalTitle" class="font-bold text-slate-200 truncate text-sm">編集</h2>
        <span id="queueInfo" class="text-[10px] bg-indigo-900 text-indigo-300 px-3 py-1 rounded-full">0 / 0</span>
      </div>
      <div class="flex-grow p-4 bg-black flex items-center justify-center relative min-h-[40vh]">
        <img id="editingImage" class="max-w-full max-h-full block">
        <div id="modalLoading" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center text-white">
          <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
          <p id="loadingMsg" class="text-[10px] font-bold uppercase">Processing...</p>
        </div>
      </div>
      <div class="p-6 border-t border-slate-700 bg-slate-800">
        <div class="flex flex-wrap items-center justify-between gap-4">
          <div class="flex gap-1 bg-slate-900 p-1 rounded-lg">
            <button class="ratio-btn px-4 py-2 text-xs rounded-md bg-indigo-600 text-white" data-ratio="NaN">フリー</button>
            <button class="ratio-btn px-4 py-2 text-xs rounded-md text-slate-400" data-ratio="1.77777777">16:9</button>
            <button class="ratio-btn px-4 py-2 text-xs rounded-md text-slate-400" data-ratio="1.33333333">4:3</button>
            <button class="ratio-btn px-4 py-2 text-xs rounded-md text-slate-400" data-ratio="1">1:1</button>
          </div>
          <div class="flex gap-3">
            <button id="skipBtn" class="px-6 py-2.5 text-xs font-bold text-slate-400 border border-slate-600 rounded-full hover:bg-slate-700 transition">スキップ</button>
            <button id="cropConfirmBtn" class="px-10 py-2.5 bg-indigo-600 text-white font-bold rounded-full hover:bg-indigo-700 shadow-lg transition">決定</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { 
      ImageMagick, 
      initializeImageMagick, 
      MagickFormat, 
      MagickColor,
      MagickGeometry,
      CompositeOperator
    } from 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.39/dist/index.js';

    const logPanel = document.getElementById('debugLog');
    function log(msg, type = 'info') {
      const colors = { info: 'text-green-400', warn: 'text-yellow-400', err: 'text-red-500', debug: 'text-blue-400' };
      logPanel.innerHTML += `> <span class="${colors[type]}">${msg}</span><br>`;
      logPanel.scrollTop = logPanel.scrollHeight;
    }

    async function initApp() {
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.39/dist/magick.wasm');
        await initializeImageMagick(new Uint8Array(await resp.arrayBuffer()));
        log("ImageMagick Engine Ready.");
        document.getElementById('imageInput').disabled = false;
      } catch (err) { log("Init Failed: " + err.message, "err"); }
    }

    let queue = [], index = 0, zip = null, cropper = null;

    document.getElementById('imageInput').addEventListener('change', (e) => {
      queue = Array.from(e.target.files);
      if (!queue.length) return;
      index = 0; zip = new JSZip();
      document.getElementById('outputArea').innerHTML = '';
      processNext();
    });

    async function processNext() {
      if (index >= queue.length) {
        closeModal();
        if (document.getElementById('outputArea').childElementCount > 0) document.getElementById('zipArea').classList.remove('hidden');
        return;
      }

      const file = queue[index];
      openModal(file.name, index + 1, queue.length);

      try {
        const bytes = new Uint8Array(await file.arrayBuffer());
        
        // 【重要】プレビュー時にも方向補正とページリセットを適用し、表示と内部データを完全に一致させる
        const pngBlob = await new Promise((res) => {
          ImageMagick.read(bytes, img => {
            img.autoOrient(); // EXIF回転を物理的に適用
            img.page = new MagickGeometry(0, 0, img.width, img.height); // キャンバス情報をリセット
            log(`Preview Load: ${img.width}x${img.height} (Oriented)`);
            img.write(data => res(new Blob([data], {type:'image/png'})));
          });
        });

        const imgEl = document.getElementById('editingImage');
        imgEl.src = URL.createObjectURL(pngBlob);
        imgEl.onload = () => {
          document.getElementById('modalLoading').classList.add('hidden');
          if(cropper) cropper.destroy();
          cropper = new Cropper(imgEl, { viewMode: 1, autoCropArea: 0.8 });
        };
      } catch (e) { log(`Load Error: ${e.message}`, "err"); index++; processNext(); }
    }

    document.getElementById('cropConfirmBtn').onclick = async () => {
      if (!cropper) return;
      const file = queue[index];
      const data = cropper.getData({ rounded: true }); // 切り抜き座標
      
      document.getElementById('modalLoading').classList.remove('hidden');
      document.getElementById('loadingMsg').innerText = "Cropping...";

      try {
        const bytes = new Uint8Array(await file.arrayBuffer());
        const jpgBlob = await new Promise((res, rej) => {
          ImageMagick.read(bytes, img => {
            try {
              // 1. 方向を正す
              img.autoOrient();
              
              // 2. 仮想キャンバスを現在のサイズにリセット（ズレ防止の核心）
              img.page = new MagickGeometry(0, 0, img.width, img.height);

              // 3. 切り抜き座標の作成 (w, h, x, y ではなく Geometry を使う)
              // API: new MagickGeometry(width, height, x, y)
              const cropGeom = new MagickGeometry(data.width, data.height, Math.max(0, data.x), Math.max(0, data.y));
              
              log(`Apply Crop: ${data.width}x${data.height} at ${data.x},${data.y}`, "debug");
              
              img.crop(cropGeom);

              // 4. クロップ後の余分なページ情報を破棄 (重要)
              img.page = new MagickGeometry(0, 0, img.width, img.height);

              // 5. JPG出力設定
              img.backgroundColor = new MagickColor("white");
              try { img.alpha(11); } catch(e){}
              img.format = MagickFormat.Jpeg;
              img.quality = 90;

              img.write(data => res(new Blob([data], {type:'image/jpeg'})));
            } catch(e) { rej(e); }
          });
        });

        const newName = file.name.replace(/\.[^/.]+$/, "") + "_edit.jpg";
        zip.file(newName, jpgBlob);
        addCard(URL.createObjectURL(jpgBlob), newName);
        log(`Success: ${newName}`);
        index++; processNext();
      } catch (e) {
        log(`Crop Error: ${e.message}`, "err");
        document.getElementById('modalLoading').classList.add('hidden');
      }
    };

    // モーダル制御・カード追加などの補助関数
    function openModal(name, cur, total) {
      document.getElementById('cropModal').classList.remove('hidden');
      document.getElementById('modalTitle').innerText = name;
      document.getElementById('queueInfo').innerText = `${cur} / ${total}`;
      document.getElementById('modalLoading').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('cropModal').classList.add('hidden'); }
    function addCard(url, name) {
      const div = document.createElement('div');
      div.className = "bg-slate-800 p-2 border border-slate-700 rounded-lg text-center";
      div.innerHTML = `<img src="${url}" class="h-20 w-full object-contain mb-1 bg-black rounded"><p class="text-[8px] truncate text-slate-500 mb-1">${name}</p><a href="${url}" download="${name}" class="text-[10px] text-indigo-400 font-bold">SAVE</a>`;
      document.getElementById('outputArea').appendChild(div);
    }
    document.querySelectorAll('.ratio-btn').forEach(b => {
      b.onclick = (e) => {
        cropper.setAspectRatio(parseFloat(e.target.dataset.ratio));
        document.querySelectorAll('.ratio-btn').forEach(btn => btn.classList.remove('bg-indigo-600', 'text-white'));
        e.target.classList.add('bg-indigo-600', 'text-white');
      };
    });
    document.getElementById('skipBtn').onclick = () => { index++; processNext(); };
    document.getElementById('downloadZipBtn').onclick = async () => {
      const content = await zip.generateAsync({type:"blob"});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(content);
      a.download = "edited_images.zip";
      a.click();
    };

    initApp();
  </script>
</body>
</html>
