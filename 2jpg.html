<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Image Editor Pro - High-Res Fix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen p-4">

  <div class="max-w-4xl mx-auto bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
    <h1 class="text-xl font-bold mb-4">画像切り抜きツール <span class="text-xs text-indigo-400">High-Res Frame Matcher</span></h1>
    
    <div id="debugLog" class="mb-4 p-3 bg-black rounded font-mono text-[10px] text-green-400 overflow-y-auto max-h-32 border border-slate-700"></div>

    <input id="imageInput" type="file" multiple class="hidden" accept="image/*,.heic,.psd,.tiff" />
    <label for="imageInput" id="dropZone" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-600 rounded-xl cursor-pointer hover:border-indigo-500 transition-all bg-slate-800/50">
      <p id="uploadText" class="text-sm font-bold text-slate-400">エンジン準備中...</p>
    </label>

    <div id="zipArea" class="mt-6 text-center hidden">
      <button id="downloadZipBtn" class="bg-indigo-600 px-8 py-2 rounded-full font-bold hover:bg-indigo-700 transition shadow-lg">一括保存 (ZIP)</button>
    </div>
    <div id="outputArea" class="grid grid-cols-3 sm:grid-cols-6 gap-2 mt-6"></div>
  </div>

  <div id="cropModal" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center hidden p-4">
    <div class="bg-slate-800 rounded-2xl w-full max-w-4xl overflow-hidden border border-slate-700 flex flex-col">
      <div class="p-3 border-b border-slate-700 flex justify-between items-center">
        <span id="modalTitle" class="text-xs font-mono truncate"></span>
        <span id="queueInfo" class="text-[10px] bg-indigo-900 px-2 py-0.5 rounded"></span>
      </div>
      <div class="bg-black flex-grow flex items-center justify-center relative min-h-[50vh]">
        <img id="editingImage" class="max-w-full max-h-full">
        <div id="modalLoading" class="absolute inset-0 bg-black/70 flex flex-col items-center justify-center">
          <div class="w-6 h-6 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin mb-2"></div>
          <p class="text-[10px] uppercase font-bold text-indigo-400">Processing...</p>
        </div>
      </div>
      <div class="p-4 bg-slate-800 border-t border-slate-700 flex justify-between items-center">
        <div class="flex gap-1">
          <button class="ratio-btn px-3 py-1 bg-indigo-600 text-[10px] rounded" data-ratio="NaN">Free</button>
          <button class="ratio-btn px-3 py-1 bg-slate-700 text-[10px] rounded" data-ratio="1">1:1</button>
        </div>
        <div class="flex gap-2">
          <button id="skipBtn" class="px-4 py-2 text-[10px] text-slate-400">SKIP</button>
          <button id="cropConfirmBtn" class="px-8 py-2 bg-indigo-600 rounded-full text-[10px] font-bold">決定して次へ</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { 
      ImageMagick, 
      initializeImageMagick, 
      MagickFormat, 
      MagickColor,
      MagickGeometry,
      MagickImageCollection
    } from 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.39/dist/index.js';

    const log = (msg, type='info') => {
      const el = document.getElementById('debugLog');
      const colors = { info:'text-green-400', err:'text-red-500', debug:'text-blue-400' };
      el.innerHTML += `> <span class="${colors[type]}">${msg}</span><br>`;
      el.scrollTop = el.scrollHeight;
    };

    async function init() {
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.39/dist/magick.wasm');
        await initializeImageMagick(new Uint8Array(await resp.arrayBuffer()));
        log("Engine Ready.");
        document.getElementById('imageInput').disabled = false;
        document.getElementById('uploadText').innerText = "画像を選択 (複数可)";
      } catch(e) { log("Engine Init Error", "err"); }
    }

    let queue = [], index = 0, zip = null, cropper = null;

    document.getElementById('imageInput').onchange = (e) => {
      queue = Array.from(e.target.files);
      if(!queue.length) return;
      index = 0; zip = new JSZip();
      document.getElementById('outputArea').innerHTML = '';
      processNext();
    };

    // ファイルから「最大の画像（メイン画像）」を選択する関数
    function findMainImage(images) {
      let main = images[0];
      let maxArea = main.width * main.height;
      images.forEach(img => {
        const area = img.width * img.height;
        if(area > maxArea) {
          maxArea = area;
          main = img;
        }
      });
      return main;
    }

    async function processNext() {
      if(index >= queue.length) {
        document.getElementById('cropModal').classList.add('hidden');
        if(document.getElementById('outputArea').childElementCount > 0) document.getElementById('zipArea').classList.remove('hidden');
        return;
      }

      const file = queue[index];
      document.getElementById('cropModal').classList.remove('hidden');
      document.getElementById('modalTitle').innerText = file.name;
      document.getElementById('queueInfo').innerText = `${index+1}/${queue.length}`;
      document.getElementById('modalLoading').classList.remove('hidden');

      try {
        const bytes = new Uint8Array(await file.arrayBuffer());
        
        // Collectionとして読み込み、全フレームをチェック
        MagickImageCollection.read(bytes, (images) => {
          const mainImg = findMainImage(images); // 最も大きい画像を選ぶ
          mainImg.autoOrient();
          mainImg.page = new MagickGeometry(0, 0, mainImg.width, mainImg.height);
          
          log(`Main Frame: ${mainImg.width}x${mainImg.height}`, "debug");

          mainImg.write(data => {
            const url = URL.createObjectURL(new Blob([data], {type:'image/png'}));
            const imgEl = document.getElementById('editingImage');
            imgEl.src = url;
            imgEl.onload = () => {
              document.getElementById('modalLoading').classList.add('hidden');
              if(cropper) cropper.destroy();
              cropper = new Cropper(imgEl, { viewMode: 1, autoCropArea: 0.8 });
            };
          }, MagickFormat.Png);
        });
      } catch(e) { log(`Load Error: ${e.message}`, "err"); index++; processNext(); }
    }

    document.getElementById('cropConfirmBtn').onclick = async () => {
      if(!cropper) return;
      const file = queue[index];
      const crop = cropper.getData({ rounded: true });
      document.getElementById('modalLoading').classList.remove('hidden');

      try {
        const bytes = new Uint8Array(await file.arrayBuffer());
        
        await MagickImageCollection.read(bytes, async (images) => {
          const img = findMainImage(images);
          img.autoOrient();
          img.page = new MagickGeometry(0, 0, img.width, img.height);

          // 文字列によるGeometry指定で誤動作を防止 "widthxheight+x+y"
          const geoStr = `${crop.width}x${crop.height}+${Math.max(0, crop.x)}+${Math.max(0, crop.y)}`;
          log(`Executing: img.crop("${geoStr}")`);
          
          img.crop(new MagickGeometry(geoStr));
          img.page = new MagickGeometry(0, 0, img.width, img.height); // 切り抜き後の再設定

          img.backgroundColor = new MagickColor("white");
          try { img.alpha(11); } catch(e){}

          img.format = MagickFormat.Jpeg;
          img.quality = 90;

          img.write(data => {
            const blob = new Blob([data], {type:'image/jpeg'});
            const url = URL.createObjectURL(blob);
            const name = file.name.replace(/\.[^/.]+$/, "") + "_edit.jpg";
            zip.file(name, blob);
            
            const div = document.createElement('div');
            div.className = "bg-slate-800 p-1 border border-slate-700 rounded text-center shadow-xl";
            div.innerHTML = `<img src="${url}" class="h-16 w-full object-contain bg-black mb-1"><a href="${url}" download="${name}" class="text-[8px] text-indigo-400 font-bold uppercase">Save</a>`;
            document.getElementById('outputArea').appendChild(div);
            
            log(`Success: ${name} (${img.width}x${img.height})`);
            index++;
            processNext();
          });
        });
      } catch(e) { log(`Crop Error: ${e.message}`, "err"); document.getElementById('modalLoading').classList.add('hidden'); }
    };

    document.querySelectorAll('.ratio-btn').forEach(b => {
      b.onclick = (e) => {
        cropper.setAspectRatio(parseFloat(e.target.dataset.ratio));
        document.querySelectorAll('.ratio-btn').forEach(btn => btn.classList.replace('bg-indigo-600', 'bg-slate-700'));
        e.target.classList.replace('bg-slate-700', 'bg-indigo-600');
      };
    });
    document.getElementById('skipBtn').onclick = () => { index++; processNext(); };
    document.getElementById('downloadZipBtn').onclick = async () => {
      const content = await zip.generateAsync({type:"blob"});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(content);
      a.download = "images.zip";
      a.click();
    };

    init();
  </script>
</body>
</html>
