<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>画像編集ツール (回転・トリミング)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
  <style>
    /* Cropper.jsのエリアの背景色を少し暗くして画像を見やすくする */
    .cropper-bg {
      background-image: none;
      background-color: #f3f4f6; /* bg-gray-100 */
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
  
  <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 md:p-8">
    
    <div class="text-center mb-8">
      <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">画像の回転・トリミング</h1>
      <p class="text-gray-500 text-sm">PNGまたはJPG画像をアップロードして、回転や好きな比率で切り抜くことができます。</p>
      <p class="text-gray-400 text-xs mt-1">ファイルはサーバーに送信されず、ブラウザ上で安全に処理されます。</p>
    </div>

    <div id="uploadArea" class="flex items-center justify-center w-full mb-6">
      <label for="imageInput" class="flex flex-col items-center justify-center w-full h-48 border-2 border-blue-300 border-dashed rounded-lg cursor-pointer bg-blue-50 hover:bg-blue-100 transition">
        <div class="flex flex-col items-center justify-center pt-5 pb-6">
          <svg class="w-12 h-12 mb-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          <p class="mb-2 text-sm text-gray-700"><span class="font-semibold">クリックして画像を選択</span></p>
          <p class="text-xs text-gray-500">PNG, JPG (最大10MB推奨)</p>
        </div>
        <input id="imageInput" type="file" accept="image/png, image/jpeg" class="hidden" />
      </label>
    </div>

    <div id="editorArea" class="hidden space-y-6">
      
      <div class="bg-gray-50 p-4 rounded-lg flex flex-wrap gap-y-3 gap-x-2 items-center justify-center border border-gray-200">
        <div class="flex items-center gap-1.5 mr-4">
          <span class="text-sm font-medium text-gray-600">回転:</span>
          <button id="rotateLeftBtn" class="p-2 bg-white border border-gray-300 rounded-md hover:bg-gray-100 text-gray-700 shadow-sm" title="左に90度回転">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
          </button>
          <button id="rotateRightBtn" class="p-2 bg-white border border-gray-300 rounded-md hover:bg-gray-100 text-gray-700 shadow-sm" title="右に90度回転">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
          </button>
        </div>
        
        <div class="hidden md:block w-px h-6 bg-gray-300 mx-2"></div>
        
        <div class="flex items-center gap-1.5 flex-wrap justify-center">
          <span class="text-sm font-medium text-gray-600">切り抜き比率:</span>
          <button class="aspect-btn px-3 py-1.5 bg-white border border-gray-300 rounded text-sm hover:bg-gray-100 text-gray-700 shadow-sm transition" data-aspect="NaN">フリー</button>
          <button class="aspect-btn px-3 py-1.5 bg-white border border-gray-300 rounded text-sm hover:bg-gray-100 text-gray-700 shadow-sm transition" data-aspect="1.7777777777777777">16:9</button>
          <button class="aspect-btn px-3 py-1.5 bg-white border border-gray-300 rounded text-sm hover:bg-gray-100 text-gray-700 shadow-sm transition" data-aspect="1.3333333333333333">4:3</button>
          <button class="aspect-btn px-3 py-1.5 bg-white border border-gray-300 rounded text-sm hover:bg-gray-100 text-gray-700 shadow-sm transition" data-aspect="1">1:1</button>
        </div>
      </div>

      <div class="border border-gray-200 rounded-lg bg-gray-100 flex justify-center items-center overflow-hidden" style="min-height: 300px; max-height: 70vh;">
        <img id="imagePreview" src="" alt="編集プレビュー" class="max-w-full block">
      </div>

      <div class="flex gap-4 justify-center pt-4">
        <button id="cancelBtn" class="px-6 py-2.5 border border-gray-300 text-gray-700 rounded-full hover:bg-gray-100 transition shadow-sm text-sm flex items-center">
            <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            キャンセル
        </button>
        <button id="saveBtn" class="px-8 py-3 bg-green-600 text-white font-bold rounded-full hover:bg-green-700 transition shadow-lg flex items-center justify-center">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
          編集を完了して保存
        </button>
      </div>
    </div>

    <div id="status" class="text-center text-blue-600 font-semibold mt-6 hidden">
      画像を処理中...
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

  <script>
    // DOM要素の取得
    const imageInput = document.getElementById('imageInput');
    const uploadArea = document.getElementById('uploadArea');
    const editorArea = document.getElementById('editorArea');
    const imagePreview = document.getElementById('imagePreview');
    const statusDiv = document.getElementById('status');
    
    const rotateLeftBtn = document.getElementById('rotateLeftBtn');
    const rotateRightBtn = document.getElementById('rotateRightBtn');
    const aspectBtns = document.querySelectorAll('.aspect-btn');
    const cancelBtn = document.getElementById('cancelBtn');
    const saveBtn = document.getElementById('saveBtn');

    let cropper = null; // Cropperインスタンス保持用
    let originalFileName = "";
    let originalFileType = "";

    // --- 1. ファイル選択・読み込み ---
    imageInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      // ファイル情報の保存（保存時の名前と形式のため）
      originalFileName = file.name.replace(/\.[^/.]+$/, ""); // 拡張子を抜く
      originalFileType = file.type; // image/png か image/jpeg

      // FileReaderで画像を読み込む
      const reader = new FileReader();
      reader.onload = function(event) {
        // プレビュー画像にデータURLを設定
        imagePreview.src = event.target.result;

        // UIの切り替え
        uploadArea.classList.add('hidden');
        editorArea.classList.remove('hidden');

        // Cropper.jsの初期化
        initializeCropper();
      };
      reader.readAsDataURL(file);
    });

    // --- 2. Cropper.jsの初期化 ---
    function initializeCropper() {
      // 以前のインスタンスがあれば破棄
      if (cropper) {
        cropper.destroy();
      }

      // Cropperのオプション設定
      cropper = new Cropper(imagePreview, {
        aspectRatio: NaN, // 初期は「フリー」
        viewMode: 1, // クロップ枠を画像の範囲内に制限する
        autoCropArea: 0.8, // 初期表示時のクロップ枠の大きさ（画像の80%）
        responsive: true,
        restore: false, // ウィンドウリサイズ時に状態を復元しない（バグ防止）
        checkOrientation: true, // EXIF情報の回転を考慮する
        background: true, // 背景のチェッカーボードを表示
      });
      
      // 「フリー」ボタンをアクティブ状態にする
      setActiveAspectBtn(document.querySelector('.aspect-btn[data-aspect="NaN"]'));
    }

    // --- 3. ツールバーの操作 (回転・比率) ---

    // 回転
    rotateLeftBtn.addEventListener('click', () => {
        if (cropper) cropper.rotate(-90);
    });
    rotateRightBtn.addEventListener('click', () => {
        if (cropper) cropper.rotate(90);
    });

    // アスペクト比切り替え
    aspectBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        if (!cropper) return;
        const aspect = this.getAttribute('data-aspect');
        // Cropperに比率を設定 (NaNを指定するとフリーになる)
        cropper.setAspectRatio(parseFloat(aspect));
        setActiveAspectBtn(this);
      });
    });

    // アクティブな比率ボタンのスタイル変更 (Tailwindクラス)
    function setActiveAspectBtn(activeBtn) {
        aspectBtns.forEach(btn => {
            // デフォルトのスタイルに戻す
            btn.classList.remove('bg-blue-50', 'border-blue-500', 'text-blue-700', 'font-semibold');
            btn.classList.add('bg-white', 'border-gray-300', 'text-gray-700');
        });
        // アクティブなボタンのスタイル
        activeBtn.classList.remove('bg-white', 'border-gray-300', 'text-gray-700');
        activeBtn.classList.add('bg-blue-50', 'border-blue-500', 'text-blue-700', 'font-semibold');
    }

    // --- 4. キャンセル・保存 ---

    // キャンセルボタン
    cancelBtn.addEventListener('click', function() {
        if(cropper) {
            cropper.destroy();
            cropper = null;
        }
        imagePreview.src = "";
        imageInput.value = ""; // ファイル選択をリセット
        uploadArea.classList.remove('hidden');
        editorArea.classList.add('hidden');
        statusDiv.classList.add('hidden');
    });

    // 保存ボタン
    saveBtn.addEventListener('click', function() {
      if (!cropper) return;

      // UIを処理中にする
      saveBtn.disabled = true;
      saveBtn.classList.add('opacity-60', 'cursor-not-allowed');
      statusDiv.classList.remove('hidden');

      // 1. 切り抜かれたCanvasを取得する
      // imageSmoothingQualityをhighにして画質を保つ
      const croppedCanvas = cropper.getCroppedCanvas({
          imageSmoothingEnabled: true,
          imageSmoothingQuality: 'high',
          // 巨大な画像の場合、メモリ対策で最大サイズを制限することも可能
          // maxWidth: 4096, maxHeight: 4096,
      });

      if (!croppedCanvas) {
          alert("画像の処理に失敗しました。");
          resetSaveBtn();
          return;
      }

      // 2. CanvasをBlobデータに変換する
      // 元がPNGならPNG、それ以外（JPG等）はJPGとして保存
      let outputMimeType = originalFileType;
      let quality = undefined;

      if (originalFileType === 'image/jpeg') {
          quality = 0.9; // JPEGの場合の画質 (0.0 ～ 1.0)
      } else if (originalFileType !== 'image/png') {
          // PNGでもJPGでもない場合はJPGにする
          outputMimeType = 'image/jpeg';
          quality = 0.9;
      }

      croppedCanvas.toBlob(function(blob) {
        if (!blob) {
            alert("画像の生成に失敗しました。");
            resetSaveBtn();
            return;
        }

        // 3. ダウンロード用のリンクを作成してクリック
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        
        // 拡張子の決定
        const ext = outputMimeType === 'image/png' ? 'png' : 'jpg';
        a.download = `${originalFileName}_edited.${ext}`;
        
        a.href = url;
        document.body.appendChild(a);
        a.click();
        
        // 後片付け
        setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            resetSaveBtn();
        }, 100);

      }, outputMimeType, quality);
    });

    // 保存ボタンの状態を元に戻す
    function resetSaveBtn() {
        saveBtn.disabled = false;
        saveBtn.classList.remove('opacity-60', 'cursor-not-allowed');
        statusDiv.classList.add('hidden');
    }

  </script>
</body>
</html>
